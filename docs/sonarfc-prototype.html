<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SonarFC Prototype</title>
    <style>
      body[data-theme="dark"] {
        --bg-top: #060a08;
        --bg-mid: #0b120f;
        --bg-bottom: #08100d;
        --card-top: #0f1512;
        --card-bottom: #171d19;
        --modal-top: #0f1713;
        --modal-bottom: #18211c;
        --accent: #18c37d;
        --accent-alt: #6ee7b7;
        --accent-border: rgba(24, 195, 125, 0.35);
        --accent-tint: rgba(24, 195, 125, 0.12);
        --accent-tint-strong: rgba(24, 195, 125, 0.18);
        --active-tab-bg: linear-gradient(
          135deg,
          rgba(24, 195, 125, 0.14),
          rgba(110, 231, 183, 0.08)
        );
        --text: #ffffff;
        --text-strong: rgba(255, 255, 255, 0.8);
        --text-muted: rgba(255, 255, 255, 0.67);
        --text-dim: rgba(255, 255, 255, 0.46);
        --text-soft: rgba(255, 255, 255, 0.33);
        --text-faint: rgba(255, 255, 255, 0.2);
        --title-gradient: linear-gradient(90deg, #ffffff, rgba(255, 255, 255, 0.56));
        --pill-text: #8ef0c0;
        --line: rgba(255, 255, 255, 0.08);
        --line-soft: rgba(255, 255, 255, 0.06);
        --line-strong: rgba(255, 255, 255, 0.14);
        --surface: rgba(255, 255, 255, 0.06);
        --surface-strong: rgba(255, 255, 255, 0.08);
        --header-surface: rgba(255, 255, 255, 0.05);
        --modal-button-bg: rgba(255, 255, 255, 0.08);
        --summary-text: rgba(255, 255, 255, 0.73);
        --track: #161d19;
        --timeline-line: rgba(255, 255, 255, 0.09);
        --timeline-home-dot: rgba(255, 255, 255, 0.27);
        --timeline-away-dot: rgba(255, 255, 255, 0.13);
        --timeline-dot-border: rgba(255, 255, 255, 0.2);
        --vs-ghost: rgba(255, 255, 255, 0.13);
        --card-shadow: 0 8px 40px rgba(0, 0, 0, 0.27);
        --modal-shadow: 0 24px 80px rgba(0, 0, 0, 0.53);
        --overlay: rgba(2, 4, 3, 0.8);
      }

      body[data-theme="light"] {
        --bg-top: #f2f5f3;
        --bg-mid: #edf2ef;
        --bg-bottom: #f7f9f8;
        --card-top: #ffffff;
        --card-bottom: #f7faf8;
        --modal-top: #ffffff;
        --modal-bottom: #f8fbf9;
        --accent: #17b26a;
        --accent-alt: #52d69b;
        --accent-border: rgba(23, 178, 106, 0.35);
        --accent-tint: rgba(23, 178, 106, 0.1);
        --accent-tint-strong: rgba(23, 178, 106, 0.18);
        --active-tab-bg: linear-gradient(
          135deg,
          rgba(23, 178, 106, 0.1),
          rgba(82, 214, 155, 0.06)
        );
        --text: #111815;
        --text-strong: #23302a;
        --text-muted: #33413b;
        --text-dim: #66746e;
        --text-soft: #87948e;
        --text-faint: #a0aca6;
        --title-gradient: linear-gradient(90deg, #111815, #5f6f68);
        --pill-text: #0e8f59;
        --line: #dce5e0;
        --line-soft: #e7eeea;
        --line-strong: #cdd8d2;
        --surface: #f4f7f5;
        --surface-strong: #f7faf8;
        --header-surface: #f8fbf9;
        --modal-button-bg: #e7eeea;
        --summary-text: #46534d;
        --track: #ecf2ee;
        --timeline-line: #d8e1dc;
        --timeline-home-dot: #d1dbd5;
        --timeline-away-dot: #e8efeb;
        --timeline-dot-border: #c7d1cc;
        --vs-ghost: #d7e1dc;
        --card-shadow: 0 10px 32px rgba(15, 23, 21, 0.08);
        --modal-shadow: 0 24px 64px rgba(15, 23, 21, 0.16);
        --overlay: rgba(11, 16, 13, 0.2);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        padding: 0;
        min-height: 100%;
      }

      body {
        min-height: 100vh;
        background: linear-gradient(
          180deg,
          var(--bg-top),
          var(--bg-mid),
          var(--bg-bottom)
        );
        color: var(--text);
        font-family:
          "SF Pro Display", -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
      }

      button {
        font: inherit;
      }

      .app {
        min-height: 100vh;
        padding-bottom: 40px;
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 20px 32px;
        border-bottom: 1px solid var(--line);
        gap: 16px;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .topbar-actions {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
        justify-content: flex-end;
      }

      .brand-mark {
        width: 32px;
        height: 32px;
        border-radius: 10px;
        background: linear-gradient(135deg, var(--accent), var(--accent-alt));
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 16px;
      }

      .brand-title {
        font-size: 20px;
        font-weight: 900;
        letter-spacing: -0.5px;
        background: var(--title-gradient);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      .beta-pill {
        font-size: 9px;
        color: var(--pill-text);
        background: var(--accent-tint);
        border: 1px solid var(--accent-tint-strong);
        padding: 2px 8px;
        border-radius: 20px;
        font-weight: 700;
        letter-spacing: 1px;
      }

      .theme-toggle {
        display: flex;
        align-items: center;
        gap: 4px;
        padding: 3px;
        border-radius: 999px;
        background: var(--surface-strong);
        border: 1px solid var(--line-soft);
      }

      .theme-button {
        border: none;
        border-radius: 999px;
        padding: 6px 10px;
        cursor: pointer;
        font-size: 11px;
        font-weight: 700;
        background: transparent;
        color: var(--text-dim);
      }

      .theme-button.active {
        background: linear-gradient(135deg, #17b26a, #34d399);
        color: var(--text);
        box-shadow: 0 2px 10px rgba(24, 195, 125, 0.2);
      }

      .tagline {
        font-size: 12px;
        color: var(--text-faint);
        white-space: nowrap;
      }

      .tabs {
        display: flex;
        gap: 8px;
        padding: 16px 32px;
        overflow-x: auto;
      }

      .tabs::-webkit-scrollbar {
        display: none;
      }

      .tab {
        background: var(--surface-strong);
        border: 1px solid var(--line-soft);
        border-radius: 12px;
        padding: 10px 16px;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 8px;
        white-space: nowrap;
        transition: all 0.3s;
        color: inherit;
      }

      .tab.active {
        background: var(--active-tab-bg);
        border-color: var(--accent-border);
      }

      .tab-label {
        font-size: 12px;
        font-weight: 700;
        color: var(--text-dim);
      }

      .tab.active .tab-label {
        color: var(--text);
      }

      .tab-meta {
        font-size: 9px;
        color: var(--text-faint);
        margin-left: 4px;
      }

      .match-shell {
        padding: 0 32px;
        max-width: 1100px;
        margin: 0 auto;
      }

      .match-card {
        background: linear-gradient(160deg, var(--card-top), var(--card-bottom));
        border-radius: 24px;
        border: 1px solid var(--line-soft);
        overflow: hidden;
        box-shadow: var(--card-shadow);
      }

      .match-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 16px 24px;
        background: var(--header-surface);
        border-bottom: 1px solid var(--line);
        gap: 16px;
      }

      .league-meta {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .league-name {
        font-size: 12px;
        font-weight: 700;
        color: var(--text-muted);
        letter-spacing: 0.5px;
      }

      .league-round {
        font-size: 10px;
        color: var(--text-faint);
      }

      .header-actions {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .kickoff {
        font-size: 11px;
        color: var(--text-dim);
      }

      .ai-button {
        background: linear-gradient(135deg, #17b26a, #34d399);
        border: none;
        border-radius: 8px;
        padding: 5px 12px;
        font-size: 11px;
        font-weight: 700;
        color: var(--text);
        cursor: pointer;
        letter-spacing: 0.3px;
        box-shadow: 0 2px 12px rgba(24, 195, 125, 0.27);
      }

      .venue {
        text-align: center;
        padding: 8px 0 4px;
        font-size: 10px;
        color: var(--text-faint);
        letter-spacing: 0.5px;
      }

      .match-body {
        display: flex;
        padding: 12px 24px 28px;
        gap: 16px;
        align-items: flex-start;
      }

      .team-panel {
        flex: 1;
        display: flex;
        flex-direction: column;
        gap: 20px;
        min-width: 0;
      }

      .team-header {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .team-header.away {
        flex-direction: row-reverse;
      }

      .team-title-wrap.away {
        text-align: right;
      }

      .team-badge {
        width: 44px;
        height: 44px;
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 24px;
      }

      .team-name {
        font-size: 18px;
        font-weight: 800;
        color: var(--text);
        letter-spacing: -0.5px;
      }

      .team-side {
        font-size: 11px;
        color: var(--text-soft);
        letter-spacing: 1px;
      }

      .metric-row {
        display: flex;
        justify-content: space-between;
        margin-bottom: 6px;
      }

      .metric-label {
        font-size: 11px;
        color: var(--text-dim);
        font-weight: 600;
      }

      .metric-value {
        font-size: 11px;
        font-weight: 700;
      }

      .energy-bar {
        position: relative;
        width: 100%;
        height: 32px;
        border-radius: 8px;
        background: var(--track);
        overflow: hidden;
        border: 1px solid var(--line-strong);
      }

      .energy-fill {
        position: absolute;
        left: 0;
        top: 0;
        height: 100%;
        width: 0;
        border-radius: 8px;
        transition: width 1.2s cubic-bezier(0.4, 0, 0.2, 1);
      }

      .energy-text {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 13px;
        font-weight: 700;
        color: var(--text);
        letter-spacing: 1px;
        text-shadow: 0 1px 4px rgba(0, 0, 0, 0.53);
      }

      .quick-stats {
        display: flex;
        gap: 8px;
      }

      .stat-card {
        flex: 1;
        background: var(--surface-strong);
        border-radius: 10px;
        padding: 10px 8px;
        text-align: center;
        border: 1px solid var(--line-soft);
      }

      .stat-icon {
        font-size: 16px;
      }

      .stat-value {
        font-size: 16px;
        font-weight: 800;
        margin-top: 4px;
      }

      .stat-label {
        font-size: 9px;
        color: var(--text-soft);
        margin-top: 2px;
        letter-spacing: 0.3px;
      }

      .section-label {
        font-size: 11px;
        color: var(--text-dim);
        font-weight: 600;
        margin-bottom: 8px;
      }

      .momentum-grid {
        display: flex;
        gap: 6px;
        align-items: flex-end;
        height: 64px;
        padding: 0 4px;
      }

      .momentum-item {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 4px;
        flex: 1;
      }

      .momentum-result {
        font-size: 9px;
        font-weight: 800;
        opacity: 0.9;
      }

      .momentum-bar {
        width: 100%;
        max-width: 32px;
        border-radius: 6px;
        transition: height 0.8s cubic-bezier(0.4, 0, 0.2, 1);
      }

      .momentum-label {
        font-size: 8px;
        color: var(--text-dim);
        white-space: nowrap;
        letter-spacing: 0.3px;
      }

      .player-list {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .player-card {
        display: flex;
        align-items: center;
        gap: 8px;
        background: var(--surface);
        border-radius: 8px;
        padding: 8px 10px;
      }

      .player-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        flex-shrink: 0;
      }

      .player-info {
        flex: 1;
        min-width: 0;
      }

      .player-name {
        font-size: 12px;
        color: var(--text-strong);
        font-weight: 600;
      }

      .player-meta {
        font-size: 9px;
        color: var(--text-faint);
      }

      .player-status {
        font-size: 10px;
        font-weight: 700;
        flex-shrink: 0;
      }

      .absent-tags {
        display: flex;
        flex-wrap: wrap;
        gap: 4px;
      }

      .absent-tag {
        font-size: 10px;
        color: rgba(239, 68, 68, 0.8);
        background: rgba(239, 68, 68, 0.09);
        padding: 3px 8px;
        border-radius: 6px;
        font-weight: 600;
      }

      .timeline {
        position: relative;
        height: 56px;
        margin: 8px 0;
      }

      .timeline-line {
        position: absolute;
        top: 22px;
        left: 16px;
        right: 16px;
        height: 2px;
        background: var(--timeline-line);
        border-radius: 1px;
      }

      .timeline-point {
        position: absolute;
        top: 0;
        transform: translateX(-50%);
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 2px;
      }

      .timeline-comp {
        font-size: 8px;
        letter-spacing: 0.5px;
      }

      .timeline-dot {
        border-radius: 50%;
        transition: all 0.5s;
      }

      .timeline-opponent {
        font-size: 9px;
      }

      .timeline-day {
        font-size: 7px;
        color: var(--text-faint);
      }

      .vs-badge {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 6px;
        padding: 0 8px;
        flex-shrink: 0;
      }

      .vs-title {
        font-size: 22px;
        font-weight: 900;
        color: var(--vs-ghost);
        letter-spacing: 4px;
      }

      .vs-pill {
        font-size: 9px;
        color: #d2f8e4;
        background: var(--accent-tint);
        border: 1px solid var(--accent-tint-strong);
        padding: 3px 8px;
        border-radius: 20px;
        white-space: nowrap;
        font-weight: 600;
      }

      .footer {
        text-align: center;
        margin-top: 32px;
        font-size: 10px;
        color: var(--text-faint);
        letter-spacing: 0.5px;
      }

      .modal-overlay {
        position: fixed;
        inset: 0;
        background: var(--overlay);
        backdrop-filter: blur(8px);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 100;
        padding: 20px;
      }

      .modal-card {
        background: linear-gradient(160deg, var(--modal-top), var(--modal-bottom));
        border-radius: 20px;
        padding: 28px;
        max-width: 600px;
        width: 100%;
        border: 1px solid var(--line-strong);
        box-shadow: var(--modal-shadow);
      }

      .modal-head {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
      }

      .modal-title {
        font-size: 14px;
        font-weight: 700;
        color: var(--text);
        letter-spacing: 0.5px;
      }

      .close-button {
        background: var(--modal-button-bg);
        border: none;
        border-radius: 8px;
        color: var(--text);
        width: 28px;
        height: 28px;
        cursor: pointer;
        font-size: 14px;
      }

      .summary-head {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 14px;
      }

      .summary-team {
        font-size: 13px;
        font-weight: 700;
      }

      .summary-body {
        font-size: 13px;
        color: var(--summary-text);
        line-height: 1.7;
        margin: 0 0 20px 0;
        padding: 12px 14px;
        border-radius: 10px;
      }

      .summary-foot {
        margin-top: 20px;
        font-size: 10px;
        color: var(--text-faint);
        text-align: center;
      }

      @media (max-width: 980px) {
        .topbar {
          flex-direction: column;
          align-items: flex-start;
        }

        .tagline {
          white-space: normal;
        }

        .topbar-actions {
          justify-content: flex-start;
        }

        .match-body {
          flex-direction: column;
        }

        .vs-badge {
          display: none;
        }

        .team-header.away {
          flex-direction: row;
        }

        .team-title-wrap.away {
          text-align: left;
        }
      }

      @media (max-width: 720px) {
        .topbar,
        .tabs,
        .match-shell {
          padding-left: 16px;
          padding-right: 16px;
        }

        .match-header {
          flex-direction: column;
          align-items: flex-start;
        }

        .header-actions {
          width: 100%;
          justify-content: space-between;
        }
      }
    </style>
  </head>

            ],
            aiSummary:
              "曼城过去两周仅踢2场，且均为主场，旅行负担极小。哈兰德和罗德里体能充沛，阵容接近全员可用。但客场挑战安菲尔德历史胜率偏低，心理压力是隐性变量。",
          },
        },
        {
          id: 2,
          league: "La Liga",
          leagueIcon: "🇪🇸",
          matchday: "Jornada 32",
          date: "Sun, Apr 12 · 21:00",
          venue: "Santiago Bernabéu, Madrid",
          home: {
            name: "Real Madrid",
            short: "RMA",
            color: "#FEBE10",
            colorLight: "#FEBE1022",
            badge: "⚪",
            fatigue: 68,
            squadAvail: 82,
            momentum: [3, 3, 0, 3, 1],
            momentumLabels: ["SEV(A)", "VIL(H)", "ATM(A)", "GET(H)", "CEL(A)"],
            recentResults: ["W", "W", "L", "W", "D"],
            schedDensity: 5,
            schedWindow: 14,
            travelKm: 3200,
            keyAbsent: [
              "Aurélien Tchouaméni",
              "Eduardo Camavinga",
              "Dani Carvajal",
            ],
            keyFatigued: [
              { name: "Vinícius Jr", mins: 380, age: 25, level: "high" },
              { name: "Jude Bellingham", mins: 340, age: 22, level: "medium" },
            ],
            schedule: [
              { day: -14, opponent: "SEV", home: false, comp: "LL" },
              { day: -11, opponent: "BAY", home: false, comp: "UCL" },
              { day: -7, opponent: "VIL", home: true, comp: "LL" },
              { day: -4, opponent: "ATM", home: false, comp: "LL" },
              { day: -1, opponent: "BAY", home: true, comp: "UCL" },
              { day: 0, opponent: "BAR", home: true, comp: "LL", current: true },
              { day: 5, opponent: "VAL", home: false, comp: "LL" },
            ],
            aiSummary:
              "皇马经历14天5赛的魔鬼赛程，含两回合拜仁欧冠和马德里德比。维尼修斯出场380分钟高居全队之首，且3名主力中场因伤缺阵，阵容深度受到严峻考验。",
          },
          away: {
            name: "Barcelona",
            short: "BAR",
            color: "#A50044",
            colorLight: "#A5004422",
            badge: "🔵🔴",
            fatigue: 52,
            squadAvail: 95,
            momentum: [3, 3, 3, 3, 1],
            momentumLabels: ["RSO(H)", "BET(A)", "ESP(H)", "GIR(A)", "MAL(H)"],
            recentResults: ["W", "W", "W", "W", "D"],
            schedDensity: 3,
            schedWindow: 14,
            travelKm: 1100,
            keyAbsent: ["Frenkie de Jong"],
            keyFatigued: [
              { name: "Lamine Yamal", mins: 260, age: 18, level: "low" },
              { name: "Pedri", mins: 285, age: 23, level: "medium" },
            ],
            schedule: [
              { day: -11, opponent: "RSO", home: true, comp: "LL" },
              { day: -7, opponent: "BET", home: false, comp: "LL" },
              { day: -3, opponent: "ESP", home: true, comp: "LL" },
              { day: 0, opponent: "RMA", home: false, comp: "LL", current: true },
              { day: 4, opponent: "LIL", home: true, comp: "UCL" },
            ],
            aiSummary:
              "巴萨赛程相对轻松，过去两周3场且无欧冠压力。拉米尼·亚马尔体能充沛，球队近4场全胜势头强劲。仅弗兰基·德容长期缺阵，阵容完整度全联赛最高水平。",
          },
        },
      ];

      let activeMatchIndex = 0;
      let aiOpen = false;
      let themeMode = "dark";

      function fatigueColor(value) {
        if (value > 65) {
          return "#EF4444";
        }
        if (value > 45) {
          return "#F59E0B";
        }
        return "#22C55E";
      }

      function fatigueLabel(value) {
        if (value > 65) {
          return "疲劳偏高";
        }
        if (value > 45) {
          return "中等负荷";
        }
        return "体能充沛";
      }

      function levelColor(level) {
        if (level === "high") {
          return "#EF4444";
        }
        if (level === "medium") {
          return "#F59E0B";
        }
        return "#22C55E";
      }

      function advantageText(home, away) {
        const diff = home.fatigue - away.fatigue;
        if (Math.abs(diff) < 10) {
          return "势均力敌";
        }
        return diff > 0 ? `${away.short}体能占优` : `${home.short}体能占优`;
      }

      function statColorFor(type, team) {
        if (type === "squad") {
          if (team.squadAvail > 90) {
            return "#22C55E";
          }
          if (team.squadAvail > 80) {
            return "#F59E0B";
          }
          return "#EF4444";
        }

        if (type === "schedule") {
          if (team.schedDensity <= 2) {
            return "#22C55E";
          }
          if (team.schedDensity <= 3) {
            return "#F59E0B";
          }
          return "#EF4444";
        }

        if (team.travelKm < 1000) {
          return "#22C55E";
        }
        if (team.travelKm < 2000) {
          return "#F59E0B";
        }
        return "#EF4444";
      }

      function renderTabs() {
        return MATCHES.map((match, index) => {
          const activeClass = index === activeMatchIndex ? " active" : "";
          return `
            <button class="tab${activeClass}" data-match-index="${index}">
              <span style="font-size: 14px;">${match.home.badge}</span>
              <span class="tab-label">${match.home.short} vs ${match.away.short}</span>
              <span style="font-size: 14px;">${match.away.badge}</span>
              <span class="tab-meta">${match.leagueIcon} ${match.league}</span>
            </button>
          `;
        }).join("");
      }

      function renderMomentum(team) {
        return team.momentum
          .map((value, index) => {
            const height = value === 3 ? 48 : value === 1 ? 28 : 14;
            const color = value === 3 ? "#22C55E" : value === 1 ? "#F59E0B" : "#EF4444";
            return `
              <div class="momentum-item">
                <div class="momentum-result" style="color: ${color};">${team.recentResults[index]}</div>
                <div class="momentum-bar" style="height: ${height}px; background: linear-gradient(180deg, ${color}CC, ${color}44);"></div>
                <div class="momentum-label">${team.momentumLabels[index]}</div>
              </div>
            `;
          })
          .join("");
      }

      function renderPlayers(team) {
        return team.keyFatigued
          .map((player) => {
            const color = levelColor(player.level);
            const label =
              player.level === "high"
                ? "⚠️ 高负荷"
                : player.level === "medium"
                  ? "中等"
                  : "✅ 充沛";
            return `
              <div class="player-card" style="border: 1px solid ${color}22;">
                <div class="player-dot" style="background: ${color}; box-shadow: 0 0 6px ${color}66;"></div>
                <div class="player-info">
                  <div class="player-name">${player.name}</div>
                  <div class="player-meta">${player.age}岁 · 近14天${player.mins}分钟</div>
                </div>
                <div class="player-status" style="color: ${color};">${label}</div>
              </div>
            `;
          })
          .join("");
      }

      function renderAbsent(team) {
        if (team.keyAbsent.length === 0) {
          return "";
        }

        const items = team.keyAbsent
          .map((player) => `<span class="absent-tag">✕ ${player}</span>`)
          .join("");

        return `
          <div>
            <div class="section-label" style="margin-bottom: 6px;">🚑 缺阵球员</div>
            <div class="absent-tags">${items}</div>
          </div>
        `;
      }

      function renderTimeline(schedule, color) {
        const minDay = Math.min(...schedule.map((item) => item.day));
        const maxDay = Math.max(...schedule.map((item) => item.day));
        const range = maxDay - minDay || 1;

        const points = schedule
          .map((item) => {
            const left = ((item.day - minDay) / range) * 100;
            const isCurrent = Boolean(item.current);
            const dotSize = isCurrent ? 18 : 10;
            const dotBg = isCurrent
              ? color
              : item.home
                ? "var(--timeline-home-dot)"
                : "var(--timeline-away-dot)";
            const dotBorder = isCurrent
              ? "2px solid var(--text)"
              : "1px solid var(--timeline-dot-border)";
            const compColor = isCurrent ? "var(--text)" : "var(--text-soft)";
            const opponentColor = isCurrent ? "var(--text)" : "var(--text-dim)";

            return `
              <div class="timeline-point" style="left: calc(${left}%);">
                <div class="timeline-comp" style="color: ${compColor}; font-weight: ${isCurrent ? 800 : 500};">
                  ${item.comp}
                </div>
                <div
                  class="timeline-dot"
                  style="
                    width: ${dotSize}px;
                    height: ${dotSize}px;
                    background: ${dotBg};
                    border: ${dotBorder};
                    box-shadow: ${isCurrent ? `0 0 12px ${color}88` : "none"};
                  "
                ></div>
                <div class="timeline-opponent" style="color: ${opponentColor}; font-weight: ${isCurrent ? 700 : 400};">
                  ${item.opponent}
                </div>
                ${isCurrent ? "" : `<div class="timeline-day">${item.day > 0 ? `+${item.day}d` : `${item.day}d`}</div>`}
              </div>
            `;
          })
          .join("");

        return `
          <div class="timeline">
            <div class="timeline-line"></div>
            ${points}
          </div>
        `;
      }

      function renderQuickStats(team) {
        const travel = `${(team.travelKm / 1000).toFixed(1)}k km`;
        const stats = [
          {
            label: "阵容可用",
            value: `${team.squadAvail}%`,
            icon: "👥",
            color: statColorFor("squad", team),
          },
          {
            label: `${team.schedWindow}天赛程`,
            value: `${team.schedDensity}场`,
            icon: "📅",
            color: statColorFor("schedule", team),
          },
          {
            label: "旅行距离",
            value: travel,
            icon: "✈️",
            color: statColorFor("travel", team),
          },
        ];

        return stats
          .map(
            (stat) => `
              <div class="stat-card">
                <div class="stat-icon">${stat.icon}</div>
                <div class="stat-value" style="color: ${stat.color};">${stat.value}</div>
                <div class="stat-label">${stat.label}</div>
              </div>
            `
          )
          .join("");
      }

      function renderTeamPanel(team, side) {
        const isAway = side === "away";
        const gradient = `linear-gradient(135deg, ${team.color}44, ${team.color}11)`;
        const energyTarget = `${100 - team.fatigue}%`;

        return `
          <div class="team-panel">
            <div class="team-header${isAway ? " away" : ""}">
              <div
                class="team-badge"
                style="background: ${gradient}; border: 1px solid ${team.color}55;"
              >
                ${team.badge}
              </div>
              <div class="team-title-wrap${isAway ? " away" : ""}">
                <div class="team-name">${team.name}</div>
                <div class="team-side">${isAway ? "客场" : "主场"}</div>
              </div>
            </div>

            <div>
              <div class="metric-row">
                <span class="metric-label">⚡ 疲劳指数</span>
                <span class="metric-value" style="color: ${fatigueColor(team.fatigue)};">
                  ${team.fatigue}/100
                </span>
              </div>
              <div class="energy-bar">
                <div
                  class="energy-fill"
                  data-energy-fill="${energyTarget}"
                  style="background: linear-gradient(90deg, ${fatigueColor(team.fatigue)}DD, ${fatigueColor(team.fatigue)}88);"
                ></div>
                <div class="energy-text">${fatigueLabel(team.fatigue)} · ${team.fatigue}</div>
              </div>
            </div>

            <div class="quick-stats">
              ${renderQuickStats(team)}
            </div>

            <div>
              <div class="section-label">📈 近5场势头</div>
              <div class="momentum-grid">${renderMomentum(team)}</div>
            </div>

            <div>
              <div class="section-label">🏃 关键球员负荷</div>
              <div class="player-list">${renderPlayers(team)}</div>
            </div>

            ${renderAbsent(team)}

            <div>
              <div class="section-label" style="margin-bottom: 4px;">🗓 赛程时间轴</div>
              ${renderTimeline(team.schedule, team.color)}
            </div>
          </div>
        `;
      }

      function renderMatchCard(match) {
        return `
          <div class="match-card">
            <div class="match-header">
              <div class="league-meta">
                <span style="font-size: 16px;">${match.leagueIcon}</span>
                <span class="league-name">${match.league}</span>
                <span class="league-round">· ${match.matchday}</span>
              </div>
              <div class="header-actions">
                <span class="kickoff">${match.date}</span>
                <button class="ai-button" data-action="open-ai">🤖 AI 分析</button>
              </div>
            </div>

            <div class="venue">📍 ${match.venue}</div>

            <div class="match-body">
              ${renderTeamPanel(match.home, "home")}

              <div class="vs-badge">
                <div class="vs-title">VS</div>
                <div class="vs-pill">${advantageText(match.home, match.away)}</div>
              </div>

              ${renderTeamPanel(match.away, "away")}
            </div>
          </div>
        `;
      }

      function renderModal(match) {
        if (!aiOpen) {
          return "";
        }

        return `
          <div class="modal-overlay">
            <div class="modal-card" data-modal-card="true">
              <div class="modal-head">
                <div class="modal-title">🤖 AI 赛前状态分析</div>
                <button class="close-button" data-action="close-ai">✕</button>
              </div>

              <div class="summary-head">
                <span style="font-size: 20px;">${match.home.badge}</span>
                <span class="summary-team" style="color: ${match.home.color};">${match.home.name}</span>
              </div>
              <p
                class="summary-body"
                style="background: ${match.home.color}0A; border-left: 3px solid ${match.home.color}66;"
              >
                ${match.home.aiSummary}
              </p>

              <div class="summary-head">
                <span style="font-size: 20px;">${match.away.badge}</span>
                <span class="summary-team" style="color: ${match.away.color};">${match.away.name}</span>
              </div>
              <p
                class="summary-body"
                style="margin-bottom: 0; background: ${match.away.color}0A; border-left: 3px solid ${match.away.color}66;"
              >
                ${match.away.aiSummary}
              </p>

              <div class="summary-foot">
                基于赛程、出场数据和疲劳模型生成 · SonarFC Engine
              </div>
            </div>
          </div>
        `;
      }

      function bindEvents() {
        document.querySelectorAll("[data-match-index]").forEach((button) => {
          button.addEventListener("click", () => {
            activeMatchIndex = Number(button.dataset.matchIndex);
            aiOpen = false;
            render();
          });
        });

        document.querySelectorAll('[data-action="open-ai"]').forEach((button) => {
          button.addEventListener("click", () => {
            aiOpen = true;
            render();
          });
        });

        document.querySelectorAll("[data-theme-toggle]").forEach((button) => {
          button.onclick = () => {
            themeMode = button.dataset.themeToggle;
            applyTheme();
          };
        });

        const overlay = document.querySelector(".modal-overlay");
        const card = document.querySelector("[data-modal-card]");
        const closeButton = document.querySelector('[data-action="close-ai"]');

        if (overlay && card) {
          overlay.addEventListener("click", () => {
            aiOpen = false;
            render();
          });
          card.addEventListener("click", (event) => event.stopPropagation());
        }

        if (closeButton) {
          closeButton.addEventListener("click", () => {
            aiOpen = false;
            render();
          });
        }
      }

      function applyTheme() {
        document.body.dataset.theme = themeMode;
        document.querySelectorAll("[data-theme-toggle]").forEach((button) => {
          button.classList.toggle(
            "active",
            button.dataset.themeToggle === themeMode
          );
        });
      }

      function animateEnergyBars() {
        requestAnimationFrame(() => {
          document.querySelectorAll("[data-energy-fill]").forEach((fill) => {
            fill.style.width = fill.dataset.energyFill;
          });
        });
      }

      function render() {
        document.getElementById("tabs").innerHTML = renderTabs();
        document.getElementById("match-card").innerHTML = renderMatchCard(
          MATCHES[activeMatchIndex]
        );
        document.getElementById("modal-root").innerHTML = renderModal(
          MATCHES[activeMatchIndex]
        );
        bindEvents();
        applyTheme();
        animateEnergyBars();
      }

      render();
    </script>
  </body>
</html>
